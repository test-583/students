<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Student Event System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>🎓 Create Account</h2>
    <p class="subtitle">Join EventHub today</p>

    <div class="alert" id="msg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@college.edu" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" />
    </div>

    <button class="btn-primary" onclick="signup()">Create Account</button>

    <div class="auth-link">
      Already have an account? <a href="index.html">Login</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  async function signup() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!name || !email || !password) {
      return showMsg('msg', 'All fields are required');
    }

    if (password.length < 6) {
      return showMsg('msg', 'Password must be at least 6 characters');
    }

    try {
      const res = await fetch(`${API}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();

      if (data.success) {
        showMsg('msg', 'Account created! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        showMsg('msg', data.message);
      }
    } catch (err) {
      showMsg('msg', 'Cannot connect to server. Try again later.');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') signup();
  });
</script>
</body>
</html>
