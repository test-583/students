<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Student Event System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>🎓 EventHub</h2>
    <p class="subtitle">Student Event Management System</p>

    <div class="alert" id="msg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@college.edu" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>

    <button class="btn-primary" onclick="login()">Login</button>

    <div class="auth-link">
      New here? <a href="signup.html">Create an account</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // If already logged in, redirect
  const existing = getUser();
  if (existing) {
    window.location.href = existing.role === 'admin' ? 'admin.html' : 'dashboard.html';
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      return showMsg('msg', 'Please enter email and password');
    }

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.success) {
        saveUser(data.user); // Save to localStorage
        showMsg('msg', 'Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 800);
      } else {
        showMsg('msg', data.message);
      }
    } catch (err) {
      showMsg('msg', 'Cannot connect to server. Try again later.');
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
